name = "r2-signer"
main = "src/worker.js"
compatibility_date = "2024-10-01"

# All secrets must be set via `wrangler secret put <NAME>`
# Never commit real values here.
#
# Required:
#   wrangler secret put R2_ACCOUNT_ID
#   wrangler secret put R2_BUCKET_NAME
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY
#   wrangler secret put TOKEN_SECRET        (must match paste-api TOKEN_SECRET)
#
# Optional:
#   wrangler secret put R2_REGION           (defaults to 'auto')
